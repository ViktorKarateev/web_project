<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты</title>
    <!-- Подключение Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">
    <!-- Боковое меню -->
    <div class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
        <h2 class="fs-4">Меню</h2>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link text-white" href="#">Главная</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" href="#">Категории</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" href="#">Заказы</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" href="#">Контакты</a>
            </li>
        </ul>
    </div>

    <!-- Основной контент -->
    <div class="container p-5">
        <h1>Контакты</h1>

        <div class="row mt-4">
            <!-- Форма -->
            <div class="col-md-6">
                <form>
                    <div class="mb-3">
                        <label for="name" class="form-label">Имя</label>
                        <input type="text" class="form-control" id="name" placeholder="Ваше имя">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Почта</label>
                        <input type="email" class="form-control" id="email" placeholder="Ваш email">
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Сообщение</label>
                        <textarea class="form-control" id="message" rows="4" placeholder="Ваше сообщение"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </form>
            </div>

            <!-- Текст про контакты -->
            <div class="col-md-6">
                <h5>Наши контакты</h5>
                <p>Вы можете связаться с нами через эту форму. Мы обязательно ответим вам в кратчайшие сроки.</p>
                <p>Также вы можете написать на почту support@example.com или позвонить по телефону +7 999 123-45-67.</p>
            </div>
        </div>

    </div>
</div>

<!-- Скрипты Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
